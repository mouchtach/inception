# version: '3.8'

volumes:
  wordpress_data:
    driver: local
    driver_opts: 
      type: none
      device: /Users/macbookpro/inception/inception/wordpress_data
      o: bind
  mariadb_data:
    driver: local
    driver_opts: 
      type: none
      device: /Users/macbookpro/inception/inception/mariadb_data
      o: bind

services:
  nginx:
    container_name: nginx
    build: ./requirements/nginx
    depends_on:
      - wordpress
      - adminer
    ports:
      - 443:443
    volumes:
      - wordpress_data:/var/www/html
    restart: unless-stopped
    networks:
      - inception

  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb/.
    volumes:
      - mariadb_data:/var/lib/mysql
    secrets:
      - db_password
      - db_root_password
    env_file:
      - .env
    networks:
      - inception
    restart: unless-stopped

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    env_file:
      - .env
    depends_on:
      - mariadb
    expose:
      - "9000"
    volumes:
      - wordpress_data:/var/www/html
    secrets:
      - db_password
      - wp_password
      - wp_admin_password
      - redis_password
    restart: unless-stopped
    networks:
      - inception

  redis:
    container_name: redis
    build: ./requirements/bonus/redis
    ports:
      - 6379:6379
    secrets:
      - redis_password
    restart: unless-stopped
    networks:
      - inception

  adminer:
    container_name: adminer
    build: ./requirements/bonus/adminer
    depends_on:
      - mariadb
    expose:
      - "8080"
    networks:
      - inception
    restart: unless-stopped

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_password:
    file: ../secrets/wp_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  redis_password:
    file: ../secrets/redis_password.txt

networks:
  inception:
    driver: bridge